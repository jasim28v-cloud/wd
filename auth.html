<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZORAK | تسجيل الدخول</title>
    <meta name="theme-color" content="#7c3aed">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-animation div {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-20px) translateX(10px); }
        }
        
        .auth-container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            margin-bottom: 32px;
        }
        
        .logo h1 {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-group {
            margin-bottom: 16px;
            position: relative;
        }
        
        .input-group i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 13px;
        }
        
        .divider-line {
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
        
        .social-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .social-btn:hover {
            background: #f9fafb;
            border-color: #7c3aed;
        }
        
        .social-btn i {
            font-size: 20px;
        }
        
        .auth-footer {
            margin-top: 28px;
            color: #6b7280;
            font-size: 14px;
        }
        
        .auth-footer a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .error-msg {
            color: #ef4444;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
        
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }
            .logo h1 {
                font-size: 42px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div style="top: 10%; left: 5%; width: 80px; height: 80px; animation-delay: 0s;"></div>
        <div style="top: 20%; right: 10%; width: 50px; height: 50px; animation-delay: 1s;"></div>
        <div style="bottom: 15%; left: 15%; width: 70px; height: 70px; animation-delay: 2s;"></div>
        <div style="top: 60%; right: 20%; width: 40px; height: 40px; animation-delay: 0.5s;"></div>
        <div style="bottom: 30%; right: 5%; width: 60px; height: 60px; animation-delay: 1.5s;"></div>
    </div>
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <h1>ZORAK</h1>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
                </div>
                <div class="input-group">
                    <i class="fa-regular fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="كلمة المرور">
                </div>
                <button class="btn-primary" onclick="login()">تسجيل الدخول</button>
                
                <div class="divider">
                    <div class="divider-line"></div>
                    <span>أو</span>
                    <div class="divider-line"></div>
                </div>
                
                <button class="social-btn" onclick="loginWithGoogle()">
                    <i class="fa-brands fa-google"></i>
                    <span>تسجيل الدخول باستخدام Google</span>
                </button>
                
                <div class="auth-footer">
                    ليس لديك حساب؟ <a onclick="showRegister()">إنشاء حساب</a>
                </div>
                <div id="loginMsg" class="error-msg"></div>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="auth-form">
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="regName" placeholder="الاسم الكامل">
                </div>
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
                </div>
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="regUsername" placeholder="اسم المستخدم">
                </div>
                <div class="input-group">
                    <i class="fa-regular fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="كلمة المرور">
                </div>
                <div class="input-group">
                    <i class="fa-regular fa-lock"></i>
                    <input type="password" id="regConfirmPassword" placeholder="تأكيد كلمة المرور">
                </div>
                <button class="btn-primary" onclick="register()">إنشاء حساب</button>
                
                <div class="divider">
                    <div class="divider-line"></div>
                    <span>أو</span>
                    <div class="divider-line"></div>
                </div>
                
                <button class="social-btn" onclick="signUpWithGoogle()">
                    <i class="fa-brands fa-google"></i>
                    <span>التسجيل باستخدام Google</span>
                </button>
                
                <div class="auth-footer">
                    لديك حساب بالفعل؟ <a onclick="showLogin()">تسجيل الدخول</a>
                </div>
                <div id="regMsg" class="error-msg"></div>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // Firebase services (will be defined after firebase-config.js loads)
        let auth, db;
        
        // Wait for Firebase to load
        function initFirebase() {
            auth = firebase.auth();
            db = firebase.database();
        }
        
        function showLogin() {
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
        }
        
        function showRegister() {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.add('active');
        }
        
        async function login() {
            if (!auth) initFirebase();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMsg');
            
            if (!email || !password) {
                msgDiv.textContent = 'الرجاء إدخال جميع الحقول';
                return;
            }
            
            msgDiv.innerHTML = '<div class="spinner"></div> جاري تسجيل الدخول...';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                const snapshot = await db.ref(`users/${user.uid}`).once('value');
                
                if (!snapshot.exists()) {
                    await db.ref(`users/${user.uid}`).set({
                        uid: user.uid,
                        name: user.displayName || email.split('@')[0],
                        username: user.displayName || email.split('@')[0],
                        email: email,
                        bio: "مرحباً! أنا في ZORAK ✨",
                        avatar: "",
                        cover: "",
                        website: "",
                        verified: false,
                        isAdmin: email === ADMIN_EMAIL,
                        followers: {},
                        following: {},
                        createdAt: Date.now()
                    });
                }
                
                if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                    await db.ref(`users/${user.uid}`).update({ isAdmin: true, verified: 'blue' });
                }
                
                window.location.href = 'index.html';
            } catch (error) {
                msgDiv.textContent = error.message;
            }
        }
        
        async function register() {
            if (!auth) initFirebase();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirmPass = document.getElementById('regConfirmPassword').value;
            const msgDiv = document.getElementById('regMsg');
            
            if (!name || !email || !username || !password) {
                msgDiv.textContent = 'الرجاء ملء جميع الحقول';
                return;
            }
            if (password !== confirmPass) {
                msgDiv.textContent = 'كلمة المرور غير متطابقة';
                return;
            }
            
            msgDiv.innerHTML = '<div class="spinner"></div> جاري إنشاء الحساب...';
            
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await userCredential.user.updateProfile({ displayName: name });
                
                await db.ref(`users/${userCredential.user.uid}`).set({
                    uid: userCredential.user.uid,
                    name: name,
                    username: username,
                    email: email,
                    bio: "مرحباً! أنا في ZORAK ✨",
                    avatar: "",
                    cover: "",
                    website: "",
                    verified: false,
                    isAdmin: email === ADMIN_EMAIL,
                    followers: {},
                    following: {},
                    createdAt: Date.now()
                });
                
                window.location.href = 'index.html';
            } catch (error) {
                msgDiv.textContent = error.message;
            }
        }
        
        async function loginWithGoogle() {
            if (!auth) initFirebase();
            const provider = new firebase.auth.GoogleAuthProvider();
            const msgDiv = document.getElementById('loginMsg');
            msgDiv.innerHTML = '<div class="spinner"></div> جاري تسجيل الدخول...';
            
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                const snapshot = await db.ref(`users/${user.uid}`).once('value');
                
                if (!snapshot.exists()) {
                    await db.ref(`users/${user.uid}`).set({
                        uid: user.uid,
                        name: user.displayName,
                        username: user.displayName.toLowerCase().replace(/\s/g, ''),
                        email: user.email,
                        bio: "مرحباً! أنا في ZORAK ✨",
                        avatar: user.photoURL || "",
                        cover: "",
                        website: "",
                        verified: false,
                        isAdmin: user.email === ADMIN_EMAIL,
                        followers: {},
                        following: {},
                        createdAt: Date.now()
                    });
                }
                
                window.location.href = 'index.html';
            } catch (error) {
                msgDiv.textContent = error.message;
            }
        }
        
        async function signUpWithGoogle() {
            await loginWithGoogle();
        }
        
        // Initialize Firebase and check auth state
        document.addEventListener('DOMContentLoaded', function() {
            // Wait a bit for firebase-config.js to load
            setTimeout(() => {
                if (typeof firebase !== 'undefined') {
                    initFirebase();
                    
                    auth.onAuthStateChanged((user) => {
                        if (user) {
                            window.location.href = 'index.html';
                        }
                    });
                }
            }, 500);
        });
    </script>
</body>
</html>
