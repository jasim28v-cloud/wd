<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZORAK | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo h1 {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
        }
        .input-group input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: #9ca3af;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
        .social-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .auth-footer {
            margin-top: 28px;
            color: #6b7280;
            font-size: 14px;
        }
        .auth-footer a {
            color: #7c3aed;
            cursor: pointer;
            font-weight: 600;
        }
        .error-msg {
            color: #ef4444;
            font-size: 12px;
            margin-top: 8px;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="logo"><h1>ZORAK</h1></div>
    
    <div id="loginForm" class="auth-form active">
        <div class="input-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني"></div>
        <div class="input-group"><input type="password" id="loginPassword" placeholder="كلمة المرور"></div>
        <button class="btn-primary" onclick="login()">تسجيل الدخول</button>
        <div class="divider"><div class="divider-line"></div><span>أو</span><div class="divider-line"></div></div>
        <button class="social-btn" onclick="loginWithGoogle()"><i class="fa-brands fa-google"></i> Google</button>
        <div class="auth-footer">ليس لديك حساب؟ <a onclick="showRegister()">إنشاء حساب</a></div>
        <div id="loginMsg" class="error-msg"></div>
    </div>
    
    <div id="registerForm" class="auth-form">
        <div class="input-group"><input type="text" id="regName" placeholder="الاسم الكامل"></div>
        <div class="input-group"><input type="email" id="regEmail" placeholder="البريد الإلكتروني"></div>
        <div class="input-group"><input type="text" id="regUsername" placeholder="اسم المستخدم"></div>
        <div class="input-group"><input type="password" id="regPassword" placeholder="كلمة المرور"></div>
        <div class="input-group"><input type="password" id="regConfirm" placeholder="تأكيد كلمة المرور"></div>
        <button class="btn-primary" onclick="register()">إنشاء حساب</button>
        <div class="divider"><div class="divider-line"></div><span>أو</span><div class="divider-line"></div></div>
        <button class="social-btn" onclick="loginWithGoogle()"><i class="fa-brands fa-google"></i> Google</button>
        <div class="auth-footer">لديك حساب؟ <a onclick="showLogin()">تسجيل الدخول</a></div>
        <div id="regMsg" class="error-msg"></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    function showLogin() {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('registerForm').classList.remove('active');
    }
    function showRegister() {
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('registerForm').classList.add('active');
    }
    
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const msg = document.getElementById('loginMsg');
        if (!email || !password) { msg.textContent = 'املأ جميع الحقول'; return; }
        msg.innerHTML = '<div class="spinner"></div> جاري التسجيل...';
        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = 'index.html';
        } catch (e) { msg.textContent = e.message; }
    }
    
    async function register() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const username = document.getElementById('regUsername').value;
        const pass = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        const msg = document.getElementById('regMsg');
        if (!name || !email || !username || !pass) { msg.textContent = 'املأ جميع الحقول'; return; }
        if (pass !== confirm) { msg.textContent = 'كلمة المرور غير متطابقة'; return; }
        msg.innerHTML = '<div class="spinner"></div> جاري التسجيل...';
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, pass);
            await userCred.user.updateProfile({ displayName: name });
            await db.ref(`users/${userCred.user.uid}`).set({
                uid: userCred.user.uid, name: name, username: username, email: email,
                bio: "مرحباً في ZORAK ✨", avatar: "", verified: false,
                isAdmin: email === ADMIN_EMAIL, createdAt: Date.now()
            });
            window.location.href = 'index.html';
        } catch (e) { msg.textContent = e.message; }
    }
    
    async function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;
            const snap = await db.ref(`users/${user.uid}`).once('value');
            if (!snap.exists()) {
                await db.ref(`users/${user.uid}`).set({
                    uid: user.uid, name: user.displayName, username: user.displayName.toLowerCase().replace(/\s/g,''),
                    email: user.email, bio: "مرحباً في ZORAK ✨", avatar: user.photoURL || "",
                    verified: false, isAdmin: user.email === ADMIN_EMAIL, createdAt: Date.now()
                });
            }
            window.location.href = 'index.html';
        } catch(e) { alert(e.message); }
    }
    
    auth.onAuthStateChanged(user => { if(user) window.location.href = 'index.html'; });
</script>
</body>
</html>
