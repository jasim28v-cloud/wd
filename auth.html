<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>تسجيل الدخول | WAVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* تأثير الخلفية المتحركة - أخف على الجوال */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, rgba(247,183,51,0.03) 100%);
            pointer-events: none;
        }
        
        @media (min-width: 768px) {
            body::before {
                width: 150%;
                height: 150%;
                animation: rotate 20s linear infinite;
            }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 32px 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.5s ease;
            position: relative;
            z-index: 2;
        }
        
        body.dark-mode .card {
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* تحسينات للجوال */
        @media (max-width: 480px) {
            .card {
                padding: 24px 20px;
                border-radius: 32px;
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .logo-icon {
            font-size: 48px;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        
        @media (max-width: 480px) {
            .logo-icon {
                font-size: 40px;
            }
        }
        
        .card h1 {
            font-size: 44px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        
        @media (max-width: 480px) {
            .card h1 {
                font-size: 36px;
            }
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: 6px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin: 28px 0 20px;
            background: #f0f0f0;
            border-radius: 60px;
            padding: 5px;
        }
        
        body.dark-mode .tabs {
            background: #1a1a1a;
        }
        
        .tab {
            flex: 1;
            padding: 12px 8px;
            background: none;
            border: none;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }
        
        @media (max-width: 480px) {
            .tab {
                padding: 10px 6px;
                font-size: 13px;
            }
        }
        
        body.dark-mode .tab {
            color: #aaa;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            color: white;
            box-shadow: 0 4px 12px rgba(255,107,53,0.3);
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
            animation: fadeInUp 0.4s ease-out;
        }
        
        .input-group {
            margin-bottom: 14px;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #555;
        }
        
        body.dark-mode .input-group label {
            color: #aaa;
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6b35;
            font-size: 16px;
        }
        
        input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
            background: #fff;
        }
        
        @media (max-width: 480px) {
            input {
                padding: 13px 45px 13px 14px;
                font-size: 13px;
            }
        }
        
        body.dark-mode input {
            background: #1a1a1a;
            border-color: #333;
            color: white;
        }
        
        input:focus {
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
        }
        
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255,107,53,0.3);
        }
        
        @media (max-width: 480px) {
            button {
                padding: 12px;
                font-size: 14px;
                margin-top: 16px;
            }
        }
        
        button:active {
            transform: scale(0.97);
        }
        
        .error-msg {
            color: #ff6b35;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #888;
            font-size: 12px;
        }
        
        .footer a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            transition: 0.2s;
        }
        
        .theme-toggle:active {
            transform: scale(0.92);
        }
        
        @media (max-width: 480px) {
            .theme-toggle {
                width: 38px;
                height: 38px;
                font-size: 18px;
                top: 12px;
                left: 12px;
            }
        }
        
        .wave-decoration {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ff6b35" fill-opacity="0.08" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
            background-size: cover;
            pointer-events: none;
        }
        
        .social-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .social-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        
        @media (max-width: 480px) {
            .social-btn {
                width: 40px;
                height: 40px;
            }
            .social-btn i {
                font-size: 18px;
            }
        }
        
        body.dark-mode .social-btn {
            background: #1a1a1a;
        }
        
        .social-btn:active {
            transform: scale(0.92);
        }
        
        .social-btn i {
            font-size: 18px;
            color: #ff6b35;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #ccc;
            font-size: 11px;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        
        body.dark-mode .divider::before,
        body.dark-mode .divider::after {
            background: #333;
        }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">
    <i class="fas fa-moon"></i>
</button>

<div class="card">
    <div class="logo">
        <i class="fas fa-water logo-icon"></i>
    </div>
    <h1>WAVE</h1>
    <div class="subtitle">موجتك نحو عالم جديد</div>
    
    <div class="tabs">
        <button class="tab active" id="tabLoginBtn">تسجيل الدخول</button>
        <button class="tab" id="tabRegisterBtn">إنشاء حساب</button>
    </div>
    
    <!-- Login Form -->
    <div id="loginForm" class="form active">
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <div class="input-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="example@email.com" autocomplete="email">
            </div>
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="********" autocomplete="current-password">
            </div>
        </div>
        <button id="loginBtn">تسجيل الدخول</button>
        <div id="loginError" class="error-msg"></div>
        
        <div class="divider">
            <span>أو</span>
        </div>
        
        <div class="social-buttons">
            <div class="social-btn" onclick="showToast('قريباً...')"><i class="fab fa-google"></i></div>
            <div class="social-btn" onclick="showToast('قريباً...')"><i class="fab fa-facebook-f"></i></div>
            <div class="social-btn" onclick="showToast('قريباً...')"><i class="fab fa-apple"></i></div>
        </div>
        
        <div class="footer">
            ليس لديك حساب؟ <a id="switchToRegister">إنشاء حساب جديد</a>
        </div>
    </div>
    
    <!-- Register Form -->
    <div id="registerForm" class="form">
        <div class="input-group">
            <label>اسم المستخدم</label>
            <div class="input-icon">
                <i class="fas fa-user"></i>
                <input type="text" id="regName" placeholder="أحمد محمد" autocomplete="name">
            </div>
        </div>
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <div class="input-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" id="regEmail" placeholder="example@email.com" autocomplete="email">
            </div>
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" placeholder="********" autocomplete="new-password">
            </div>
        </div>
        <div class="input-group">
            <label>تأكيد كلمة المرور</label>
            <div class="input-icon">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="regConfirm" placeholder="********" autocomplete="off">
            </div>
        </div>
        <button id="registerBtn">إنشاء حساب</button>
        <div id="registerError" class="error-msg"></div>
        
        <div class="divider">
            <span>أو</span>
        </div>
        
        <div class="social-buttons">
            <div class="social-btn" onclick="showToast('قريباً...')"><i class="fab fa-google"></i></div>
            <div class="social-btn" onclick="showToast('قريباً...')"><i class="fab fa-facebook-f"></i></div>
            <div class="social-btn" onclick="showToast('قريباً...')"><i class="fab fa-apple"></i></div>
        </div>
        
        <div class="footer">
            لديك حساب؟ <a id="switchToLogin">تسجيل الدخول</a>
        </div>
    </div>
</div>

<div class="wave-decoration"></div>

<script src="firebase-config.js"></script>
<script>
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#262626;color:white;padding:10px 20px;border-radius:40px;z-index:1000;font-size:12px;white-space:nowrap;max-width:90%;white-space:normal;text-align:center;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        const btn = document.querySelector('.theme-toggle i');
        if (isDark) {
            btn.classList.remove('fa-moon');
            btn.classList.add('fa-sun');
        } else {
            btn.classList.remove('fa-sun');
            btn.classList.add('fa-moon');
        }
        localStorage.setItem('waveTheme', isDark ? 'dark' : 'light');
    }
    
    if (localStorage.getItem('waveTheme') === 'dark') {
        document.body.classList.add('dark-mode');
        const btn = document.querySelector('.theme-toggle i');
        btn.classList.remove('fa-moon');
        btn.classList.add('fa-sun');
    }
    
    function showLogin() {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('registerForm').classList.remove('active');
        document.getElementById('tabLoginBtn').classList.add('active');
        document.getElementById('tabRegisterBtn').classList.remove('active');
        clearErrors();
    }
    
    function showRegister() {
        document.getElementById('registerForm').classList.add('active');
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('tabRegisterBtn').classList.add('active');
        document.getElementById('tabLoginBtn').classList.remove('active');
        clearErrors();
    }
    
    function clearErrors() {
        document.getElementById('loginError').innerHTML = '';
        document.getElementById('registerError').innerHTML = '';
    }
    
    function setLoading(btnId, loading, text) {
        const btn = document.getElementById(btnId);
        if (loading) {
            btn.innerHTML = '<span class="loading-spinner"></span> جاري...';
            btn.classList.add('btn-loading');
            btn.disabled = true;
        } else {
            btn.innerHTML = text;
            btn.classList.remove('btn-loading');
            btn.disabled = false;
        }
    }
    
    document.getElementById('tabLoginBtn').onclick = showLogin;
    document.getElementById('tabRegisterBtn').onclick = showRegister;
    document.getElementById('switchToRegister').onclick = showRegister;
    document.getElementById('switchToLogin').onclick = showLogin;
    
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            document.getElementById('loginError').innerHTML = '⚠️ الرجاء إدخال البريد الإلكتروني وكلمة المرور';
            return;
        }
        
        setLoading('loginBtn', true, 'تسجيل الدخول');
        
        try {
            const result = await auth.signInWithEmailAndPassword(email, password);
            
            const snapshot = await db.ref(`users/${result.user.uid}`).once('value');
            if (!snapshot.exists()) {
                await db.ref(`users/${result.user.uid}`).set({
                    name: result.user.displayName || email.split('@')[0],
                    email: email,
                    bio: "مرحباً! أنا في WAVE 🌊",
                    avatar: "",
                    cover: "",
                    website: "",
                    verified: false,
                    isAdmin: email === ADMIN_EMAIL,
                    blockedUsers: {},
                    mutedUntil: 0,
                    createdAt: Date.now()
                });
            }
            
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                await db.ref(`users/${result.user.uid}`).update({ isAdmin: true, verified: true, name: 'WAVE Admin' });
            }
            
            window.location.href = 'index.html';
        } catch (error) {
            let msg = '';
            if (error.code === 'auth/user-not-found') msg = '❌ لا يوجد حساب بهذا البريد';
            else if (error.code === 'auth/wrong-password') msg = '❌ كلمة المرور غير صحيحة';
            else if (error.code === 'auth/invalid-email') msg = '❌ البريد الإلكتروني غير صالح';
            else if (error.code === 'auth/too-many-requests') msg = '❌ تم تعطيل الحساب مؤقتاً';
            else msg = '❌ ' + error.message;
            document.getElementById('loginError').innerHTML = msg;
            setLoading('loginBtn', false, 'تسجيل الدخول');
        }
    };
    
    document.getElementById('registerBtn').onclick = async () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!name || !email || !password) {
            document.getElementById('registerError').innerHTML = '⚠️ الرجاء ملء جميع الحقول';
            return;
        }
        if (password !== confirm) {
            document.getElementById('registerError').innerHTML = '⚠️ كلمة المرور غير متطابقة';
            return;
        }
        if (password.length < 6) {
            document.getElementById('registerError').innerHTML = '⚠️ كلمة المرور 6 أحرف على الأقل';
            return;
        }
        
        setLoading('registerBtn', true, 'إنشاء حساب');
        
        try {
            const result = await auth.createUserWithEmailAndPassword(email, password);
            await result.user.updateProfile({ displayName: name });
            
            await db.ref(`users/${result.user.uid}`).set({
                name: name,
                email: email,
                bio: "مرحباً! أنا في WAVE 🌊",
                avatar: "",
                cover: "",
                website: "",
                verified: false,
                isAdmin: email === ADMIN_EMAIL,
                blockedUsers: {},
                mutedUntil: 0,
                createdAt: Date.now()
            });
            
            window.location.href = 'index.html';
        } catch (error) {
            let msg = '';
            if (error.code === 'auth/email-already-in-use') msg = '❌ البريد الإلكتروني مستخدم بالفعل';
            else if (error.code === 'auth/invalid-email') msg = '❌ البريد الإلكتروني غير صالح';
            else if (error.code === 'auth/weak-password') msg = '❌ كلمة المرور ضعيفة جداً';
            else msg = '❌ ' + error.message;
            document.getElementById('registerError').innerHTML = msg;
            setLoading('registerBtn', false, 'إنشاء حساب');
        }
    };
    
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
